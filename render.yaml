services:
  # Express API server
  - type: web
    name: scalecases-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false  # Set this to your frontend Render URL after first deploy
      - key: FB_ACCESS_TOKEN
        sync: false
      - key: FB_AD_ACCOUNTS
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SHEETS_ID
        sync: false
      - key: SHEETS_TAB_NAME
        sync: false
      - key: SHEETS_STATE_COL
        sync: false
      - key: MONTHLY_CASES_SHEET_ID
        sync: false  # Spreadsheet ID containing monthly tabs
      - key: MONTHLY_CASES_TAB
        sync: false  # Tab name to import, e.g. "March Signed Cases"

  # React frontend (static site)
  - type: web
    name: scalecases-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set this to your backend Render URL after first deploy
