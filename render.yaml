services:
  # Express API server
  - type: web
    name: scalecases-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false  # Set this to your frontend Render URL after first deploy
      - key: FB_ACCESS_TOKEN
        sync: false
      - key: FB_AD_ACCOUNTS
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SHEETS_ID
        sync: false
      - key: SHEETS_TAB_NAME
        sync: false
      - key: SHEETS_STATE_COL
        sync: false
      - key: MONTHLY_CASES_SHEET_ID
        sync: false  # Spreadsheet ID containing monthly tabs
      - key: MONTHLY_CASES_TAB
        sync: false  # Tab name to import, e.g. "March Signed Cases"
      - key: SPEND_SHEET_ID
        sync: false  # Spreadsheet ID for the spend-by-state monthly grid (one tab per month)
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # From @BotFather — enables digest delivery to Telegram
      - key: TELEGRAM_CHAT_ID
        sync: false  # Your Telegram chat id (message @userinfobot to get it)
      - key: DIGEST_TIMES
        sync: false  # e.g. "07:30,16:00" (in DIGEST_TZ); "off" disables the schedule
      - key: DIGEST_TZ
        sync: false  # e.g. America/Los_Angeles

  # React frontend (static site)
  - type: web
    name: scalecases-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set this to your backend Render URL after first deploy
